name: Build and Test

on:
  pull_request:
    branches:
      - main

env:
  FLUTTER_CHANNEL: 'stable'
  FLUTTER_VERSION: '3.41.9'
  OHOS_FLUTTER_VERSION: 'oh-3.41.9-dev'
  OHOS_SDK_VERSION: '6.0'
  FLUTTER_OHOS_STORAGE_BASE_URL: 'https://flutter-ohos.obs.cn-south-1.myhuaweicloud.com'

jobs:
  build_example_android:
    runs-on: [ ubuntu-latest ]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v2
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: cd ./example && flutter build apk
      - run: echo "build success!"

  build_example_ohos:
    runs-on: [ ubuntu-latest ]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v2
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Cache OpenHarmony Flutter SDK
        id: cache_ohos_flutter
        uses: actions/cache@v4
        with:
          path: ~/flutter-ohos
          key: ${{ runner.os }}-ohos-flutter-${{ env.OHOS_FLUTTER_VERSION }}
      - name: Setup OpenHarmony Flutter SDK
        if: steps.cache_ohos_flutter.outputs.cache-hit != 'true'
        run: |
          git clone --branch "${OHOS_FLUTTER_VERSION}" --single-branch https://gitcode.com/openharmony-tpc/flutter_flutter.git "${HOME}/flutter-ohos"
      - name: Add OpenHarmony Flutter to PATH
        run: |
          echo "${HOME}/flutter-ohos/bin" >> "$GITHUB_PATH"
      - name: Setup OpenHarmony SDK
        uses: openharmony-rs/setup-ohos-sdk@v1.0.0
        with:
          version: ${{ env.OHOS_SDK_VERSION }}
          fixup-path: true
      - name: Export OpenHarmony SDK environment
        run: |
          echo "HOS_SDK_HOME=${OHOS_NDK_HOME}" >> "$GITHUB_ENV"
          echo "OHOS_SDK_HOME=${OHOS_NDK_HOME}" >> "$GITHUB_ENV"
          echo "HDC_HOME=${OHOS_NDK_HOME}/toolchains" >> "$GITHUB_ENV"
      - name: Add OHOS tools to PATH
        run: |
          echo "${OHOS_NDK_HOME}/toolchains/ohpm/bin" >> "$GITHUB_PATH"
      - name: Configure Flutter OHOS SDK
        run: |
          flutter config --ohos-sdk="${OHOS_NDK_HOME}"
#      - name: Cache Dart pub packages
#        uses: actions/cache@v4
#        with:
#          path: ~/.pub-cache
#          key: ${{ runner.os }}-pub-cache-${{ env.FLUTTER_VERSION }}-${{ hashFiles('pubspec.yaml', 'example/pubspec.yaml', 'example/pubspec.lock') }}
#      - name: Cache OHPM dependencies
#        uses: actions/cache@v4
#        with:
#          path: |
#            ~/.ohpm
#            example/ohos/oh_modules
#          key: ${{ runner.os }}-ohpm-cache-${{ env.OHOS_SDK_VERSION }}-${{ hashFiles('example/ohos/oh-package.json5', 'example/ohos/entry/oh-package.json5', 'example/ohos/hvigor/hvigor-config.json5') }}
      - name: Install Flutter dependencies
        run: flutter pub get
      - name: Install OHOS dependencies
        run: cd ./example/ohos && ohpm install
      - name: Build OHOS example
        run: cd ./example && flutter build hap
      - run: echo "build success!"

  build_example_linux:
    runs-on: [ ubuntu-latest ]
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: sudo apt-get install clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2t64 libasound2-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: cd ./example && flutter build linux
      - run: echo "build success!"

  build_example_windows:
    runs-on: [ windows-latest ]
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: (cd ./example) -and (flutter build windows)
      - run: echo "build success!"

  build_example_ios:
    runs-on: [ macos-latest ]
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: cd ./example && flutter build ios --no-codesign
      - run: echo "build success!"

  build_example_macos:
    runs-on: [ macos-latest ]
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: cd ./example && flutter build macos
      - run: echo "build success!"
